<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLM Handoff Preview</title>
    <link rel="stylesheet" href="preview.css">
  </head>
  <body>
    <main class="layout">
      <section class="panel controls">
        <div class="preview-header">
          <h1>LLM Handoff</h1>
          <p id="confidence" class="confidence-badge"></p>
        </div>
        <div id="warnings" class="warnings" hidden></div>
        <dl id="conversation-meta" class="meta"></dl>
        <section class="range-panel" aria-labelledby="range-heading">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Export</p>
              <h2 id="range-heading">出力範囲</h2>
            </div>
            <button id="reset-range-button" class="text-button" type="button">すべて選択</button>
          </div>
          <label class="checkbox-field incremental-toggle">
            <input id="incremental-mode" type="checkbox">
            前回のダウンロード以降だけを選択
          </label>
          <label class="checkbox-field context-toggle">
            <input id="include-context" type="checkbox" checked disabled>
            直前の会話も文脈として含める
          </label>
          <label class="checkbox-field context-toggle">
            <input id="remember-position" type="checkbox" checked>
            次回の差分出力のため、今回の位置を記憶する
          </label>
          <div id="incremental-status" class="incremental-status" hidden></div>
          <div class="range-inputs">
            <label><span>開始</span><input id="range-start" type="number" min="1"></label>
            <span class="range-separator" aria-hidden="true">—</span>
            <label><span>終了</span><input id="range-end" type="number" min="1"></label>
          </div>
          <div id="range-summary" class="range-summary"></div>
          <details class="message-picker">
            <summary>メッセージから範囲を選ぶ</summary>
            <label class="field compact-field">
              <span>メッセージを検索</span>
              <input id="message-search" type="search" placeholder="キーワードを入力">
            </label>
            <label class="checkbox-field">
              <input id="user-only" type="checkbox">
              ユーザーメッセージだけ表示
            </label>
            <div id="message-results" class="message-results"></div>
          </details>
        </section>
        <section class="handoff-panel" aria-labelledby="handoff-heading">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Instructions</p>
              <h2 id="handoff-heading">次のAIへの指示</h2>
            </div>
            <select id="handoff-preset" aria-label="指示のプリセット">
              <option value="">プリセット</option>
              <option value="continue">続きから作業する</option>
              <option value="organize">まず整理する</option>
              <option value="codex">Codex向け</option>
              <option value="claude-code">Claude Code向け</option>
            </select>
          </div>
          <textarea id="handoff-input" rows="6" aria-label="次のAIへの指示"></textarea>
        </section>
        <div class="actions">
          <button id="download-button" class="primary-action" type="button">Markdownをダウンロード</button>
          <button id="copy-button" class="secondary-action" type="button">全文をコピー</button>
        </div>
        <p id="copy-status" class="action-status" role="status" aria-live="polite"></p>
      </section>
      <section class="panel preview">
        <div id="preview-toolbar" class="preview-toolbar">
          <div class="view-tabs" role="tablist" aria-label="右ペインの表示">
            <button id="preview-tab" class="view-tab" type="button" role="tab" aria-selected="true" aria-controls="preview-output">Markdown preview</button>
            <button id="help-tab" class="view-tab" type="button" role="tab" aria-selected="false" aria-controls="help-view">使い方</button>
          </div>
          <span id="preview-note">編集内容は左側へ反映されます</span>
        </div>
        <pre id="preview-output" tabindex="0" role="tabpanel" aria-labelledby="preview-tab"></pre>
        <iframe id="help-view" class="help-view" src="../help/help.html" title="LLM Handoffの使い方" role="tabpanel" aria-labelledby="help-tab" hidden></iframe>
      </section>
    </main>
    <script src="../shared/types.js"></script>
    <script src="../shared/dom.js"></script>
    <script src="../shared/markdown.js"></script>
    <script src="preview.js"></script>
  </body>
  </html>
